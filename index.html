<html lang="so">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>DIH-MIS v12 | Darusihha International Hospitals</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
  <style>
    :root {
      --hospital-blue: #1e3a8a;
      --hospital-gold: #f59e0b;
      --emergency-red: #dc2626;
    }
    
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background-color: #f1f5f9;
      -webkit-tap-highlight-color: transparent;
    }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

    #sidebar {
      background: linear-gradient(180deg, #0f172a 0%, #1e3a8a 100%);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .sidebar-link {
      display: flex;
      align-items: center;
      padding: 10px 16px;
      margin: 2px 12px;
      border-radius: 8px;
      color: #94a3b8;
      font-size: 13px;
      transition: all 0.2s;
      cursor: pointer;
    }

    .sidebar-link:hover {
      background: rgba(255,255,255,0.05);
      color: white;
    }

    .sidebar-link.active {
      background: var(--hospital-gold);
      color: #0f172a;
      font-weight: 700;
      box-shadow: 0 4px 12px rgba(245, 158, 11, 0.3);
    }

    .card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1), 0 1px 2px -1px rgb(0 0 0 / 0.1);
      border: 1px solid #e2e8f0;
      padding: 20px;
    }

    .tab-content { display: none; animation: fadeIn 0.4s ease-out; }
    .tab-content.active { display: block; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .pulse-emergency { animation: pulse-red 2s infinite; }
    @keyframes pulse-red {
      0% { box-shadow: 0 0 0 0px rgba(220, 38, 38, 0.4); }
      70% { box-shadow: 0 0 0 10px rgba(220, 38, 38, 0); }
      100% { box-shadow: 0 0 0 0px rgba(220, 38, 38, 0); }
    }

      max-width: 85%;
      margin-bottom: 12px;
      padding: 12px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.5;
    }
